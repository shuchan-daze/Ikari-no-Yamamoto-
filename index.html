<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>日報チェック by 怒りの山本 v2.9</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#f5f6f8;
  color:#111827;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}
main{
  max-width:760px;
  margin:0 auto;
  padding:24px 20px 60px;
}
h1{
  font-size:28px;
  line-height:1.25;
  margin:10px 0 6px;
}
.lead{
  color:#6b7280;
  font-size:16px;
  line-height:1.6;
  margin:0 0 26px;
}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:22px;
  padding:18px;
  margin:18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}
.btnGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.fileBtn{
  min-height:76px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:21px;
  font-weight:900;
  cursor:pointer;
  padding:8px;
}
.dark{background:#0f172a;color:#fff}
.light{background:#e5e7eb;color:#111827}
input[type=file]{display:none}
.previewWrap{
  margin-top:16px;
  border:1px solid #e5e7eb;
  border-radius:18px;
  overflow:hidden;
  background:#fafafa;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}
.previewBox{
  background:#fff;
  border-radius:14px;
  padding:8px;
}
.previewBox p{
  margin:0 0 6px;
  color:#6b7280;
  font-weight:800;
}
.previewBox img{
  width:100%;
  max-height:360px;
  object-fit:contain;
  border-radius:12px;
}
.notice{
  margin-top:14px;
  border-radius:18px;
  padding:16px;
  font-weight:800;
  line-height:1.7;
  white-space:pre-wrap;
}
.info{background:#eef4ff;color:#1e3a8a;border:1px solid #bfdbfe}
.ok{background:#e8fff0;color:#166534;border:1px solid #86efac}
.err{background:#ffe1e1;color:#991b1b;border:1px solid #fca5a5}
button{
  width:100%;
  min-height:74px;
  border-radius:20px;
  border:0;
  background:#0f172a;
  color:#fff;
  font-size:24px;
  font-weight:900;
  margin-top:14px;
}
.summary{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.sumBox{
  background:#fff7d6;
  border:1px solid #facc15;
  border-radius:18px;
  padding:14px;
}
.sumBox span{
  display:block;
  color:#6b7280;
  font-weight:800;
}
.sumBox b{
  font-size:28px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  font-size:15px;
}
th,td{
  border:1px solid #d1d5db;
  padding:8px;
}
th{background:#f3f4f6}
.center{text-align:center}
.num{text-align:right}
.missing{background:#dff4ff!important}
.warn{background:#ffdede!important}
.unknown{background:#fff3cd!important}
.small{
  font-size:12px;
  color:#6b7280;
}
.raw{
  font-size:12px;
  white-space:pre-wrap;
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:10px;
  max-height:220px;
  overflow:auto;
}
.hidden{display:none}
@media(max-width:620px){
  h1{font-size:25px}
  .fileBtn{font-size:20px;min-height:72px}
}
</style>
</head>

<body>
<main>
  <h1>日報チェック by 怒りの山本 v2.9</h1>
  <p class="lead">日報と明細を読み取り、現金・未収に振り分けて完成日報を作る確認支援UI。</p>

  <section class="card">
    <div class="btnGrid">
      <label class="fileBtn dark">📷 日報を撮影<input id="dailyCamera" type="file" accept="image/*" capture="environment"></label>
      <label class="fileBtn light">🖼️ 日報の写真を選択<input id="dailyPick" type="file" accept="image/*"></label>
      <label class="fileBtn dark">📷 明細を撮影<input id="receiptCamera" type="file" accept="image/*" capture="environment"></label>
      <label class="fileBtn light">🖼️ 明細の写真を選択<input id="receiptPick" type="file" accept="image/*"></label>
    </div>

    <div class="previewWrap">
      <div class="previewBox">
        <p>日報画像</p>
        <img id="dailyPreview">
      </div>
      <div class="previewBox">
        <p>明細画像</p>
        <img id="receiptPreview">
      </div>
    </div>

    <button onclick="runAll()">🔍 日報を完成させる</button>

    <div id="message" class="notice info">📷 ① 日報を撮る、または写真を選ぶ
📷 ② 明細を撮る、または写真を選ぶ
🔍 ③ 日報を完成させる</div>
  </section>

  <section class="card">
    <h2>集計</h2>
    <div class="summary">
      <div class="sumBox"><span>現金合計</span><b id="cashSum">0円</b></div>
      <div class="sumBox"><span>未収合計</span><b id="creditSum">0円</b></div>
      <div class="sumBox"><span>総合計</span><b id="totalSum">0円</b></div>
      <div class="sumBox"><span>件数</span><b id="countSum">0</b></div>
    </div>
  </section>

  <section class="card">
    <h2>完成日報</h2>
    <table>
      <thead>
        <tr>
          <th class="center">No</th>
          <th class="num">現金</th>
          <th class="num">未収</th>
          <th class="center">判定</th>
          <th>確認</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </section>

  <section class="card">
    <h2>読み取り結果</h2>
    <p class="small">明細OCR</p>
    <div id="receiptRaw" class="raw"></div>
    <p class="small">日報OCR</p>
    <div id="dailyRaw" class="raw"></div>
  </section>

  <canvas id="canvas" class="hidden"></canvas>
</main>

<script>
let dailyFile = null;
let receiptFile = null;
let dailyImg = null;
let receiptImg = null;

["dailyCamera","dailyPick"].forEach(id=>{
  document.getElementById(id).addEventListener("change",e=>setFile(e,"daily"));
});
["receiptCamera","receiptPick"].forEach(id=>{
  document.getElementById(id).addEventListener("change",e=>setFile(e,"receipt"));
});

function msg(text,type="info"){
  const el=document.getElementById("message");
  el.className="notice "+type;
  el.textContent=text;
}

function yen(n){
  return n ? Number(n).toLocaleString("ja-JP")+"円" : "";
}

function setFile(e,type){
  const file=e.target.files[0];
  if(!file)return;

  const url=URL.createObjectURL(file);
  const img=new Image();

  img.onload=()=>{
    if(type==="daily"){
      dailyFile=file;
      dailyImg=img;
      document.getElementById("dailyPreview").src=url;
    }else{
      receiptFile=file;
      receiptImg=img;
      document.getElementById("receiptPreview").src=url;
    }
    msg("画像を読み込みました。2枚そろったら「日報を完成させる」を押してください。","ok");
  };

  img.src=url;
}

function normalizeDigits(s){
  return s.replace(/[０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0))
          .replace(/[，、]/g,",")
          .replace(/[￥¥円]/g," ");
}

function extractAmounts(text){
  const out=[];
  const cleaned=normalizeDigits(text);
  const lines=cleaned.split(/\n/);

  for(const line of lines){
    const candidates=line.match(/\d{1,3}(?:,\d{3})+|\d{3,6}/g);
    if(!candidates)continue;

    for(const c of candidates){
      const n=Number(c.replace(/,/g,""));
      if(n>=300 && n<=999999){
        out.push(n);
      }
    }
  }
  return out;
}

function preprocessForOCR(img,mode){
  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  const maxW = mode==="receipt" ? 1200 : 1500;
  const scale=Math.min(1,maxW/img.width);

  canvas.width=Math.round(img.width*scale);
  canvas.height=Math.round(img.height*scale);

  ctx.drawImage(img,0,0,canvas.width,canvas.height);

  const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=imageData.data;

  for(let i=0;i<d.length;i+=4){
    const gray=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114);
    let v;

    if(mode==="receipt"){
      v = gray > 165 ? 255 : 0;
    }else{
      v = gray > 185 ? 255 : 0;
    }

    d[i]=d[i+1]=d[i+2]=v;
  }

  ctx.putImageData(imageData,0,0);
  return canvas.toDataURL("image/png");
}

async function ocrImage(img,mode){
  const dataUrl=preprocessForOCR(img,mode);

  const result=await Tesseract.recognize(
    dataUrl,
    "jpn+eng",
    {
      tessedit_char_whitelist:"0123456789０１２３４５６７８９,，￥¥円現金未収未",
      preserve_interword_spaces:"1"
    }
  );

  return result.data.text || "";
}

function analyzeDailyColumnsByInk(img,rowCount){
  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  const maxW=1100;
  const scale=Math.min(1,maxW/img.width);
  canvas.width=Math.round(img.width*scale);
  canvas.height=Math.round(img.height*scale);
  ctx.drawImage(img,0,0,canvas.width,canvas.height);

  const W=canvas.width,H=canvas.height;

  const top=H*0.20;
  const bottom=H*0.91;
  const rowH=(bottom-top)/rowCount;

  const cashL=W*0.58;
  const cashR=W*0.75;
  const creditL=W*0.75;
  const creditR=W*0.94;

  const rows=[];

  for(let i=0;i<rowCount;i++){
    const y1=top+i*rowH;
    const y2=y1+rowH;
    const pad=rowH*0.18;

    const cash=darkness(ctx,cashL,y1+pad,cashR,y2-pad);
    const credit=darkness(ctx,creditL,y1+pad,creditR,y2-pad);

    let type="blank";
    const threshold=5.5;

    if(cash>=threshold || credit>=threshold){
      if(cash>credit*1.08)type="cash";
      else if(credit>cash*1.08)type="credit";
      else type="unknown";
    }

    rows.push({no:i+1,type,cash,credit});
  }

  return rows;
}

function darkness(ctx,x1,y1,x2,y2){
  const w=Math.max(1,Math.floor(x2-x1));
  const h=Math.max(1,Math.floor(y2-y1));
  const data=ctx.getImageData(Math.floor(x1),Math.floor(y1),w,h).data;

  let dark=0,total=0;

  for(let i=0;i<data.length;i+=20){
    const avg=(data[i]+data[i+1]+data[i+2])/3;
    if(avg<150)dark++;
    total++;
  }

  return total ? dark/total*100 : 0;
}

function buildReport(dailyRows, amounts){
  const tbody=document.getElementById("rows");
  tbody.innerHTML="";

  let cashTotal=0;
  let creditTotal=0;
  let used=0;

  dailyRows.forEach((r,i)=>{
    const amount=amounts[i] || null;

    const tr=document.createElement("tr");
    const no=document.createElement("td");
    const cash=document.createElement("td");
    const credit=document.createElement("td");
    const judge=document.createElement("td");
    const memo=document.createElement("td");

    no.className="center";
    cash.className="num";
    credit.className="num";
    judge.className="center";

    no.textContent=r.no;

    if(!amount){
      cash.classList.add("missing");
      credit.classList.add("missing");
      judge.textContent=r.type==="blank" ? "空欄" : r.type;
      memo.textContent="明細側に対応金額なし";
    }else{
      used++;

      if(r.type==="credit"){
        credit.textContent=yen(amount);
        creditTotal+=amount;
        judge.textContent="未収";
      }else if(r.type==="cash"){
        cash.textContent=yen(amount);
        cashTotal+=amount;
        judge.textContent="現金";
      }else if(r.type==="blank"){
        cash.classList.add("missing");
        credit.classList.add("missing");
        judge.textContent="空欄";
        memo.textContent="日報側に書き込みが見えない。要確認";
      }else{
        cash.textContent=yen(amount);
        cash.classList.add("unknown");
        credit.classList.add("unknown");
        cashTotal+=amount;
        judge.textContent="不明";
        memo.textContent="現金/未収が曖昧。仮で現金";
      }
    }

    if(!memo.textContent){
      memo.innerHTML=`<span class="small">現金濃度 ${r.cash.toFixed(1)} / 未収濃度 ${r.credit.toFixed(1)}</span>`;
    }

    tr.append(no,cash,credit,judge,memo);
    tbody.appendChild(tr);
  });

  document.getElementById("cashSum").textContent=yen(cashTotal)||"0円";
  document.getElementById("creditSum").textContent=yen(creditTotal)||"0円";
  document.getElementById("totalSum").textContent=yen(cashTotal+creditTotal)||"0円";
  document.getElementById("countSum").textContent=used;
}

async function runAll(){
  try{
    if(!dailyImg){
      msg("日報画像がありません。日報写真を入れてください。","err");
      return;
    }
    if(!receiptImg){
      msg("明細画像がありません。明細写真を入れてください。","err");
      return;
    }

    msg("OCR中です。少し待ってください。","info");

    const receiptText=await ocrImage(receiptImg,"receipt");
    const dailyText=await ocrImage(dailyImg,"daily");

    document.getElementById("receiptRaw").textContent=receiptText;
    document.getElementById("dailyRaw").textContent=dailyText;

    const receiptAmounts=extractAmounts(receiptText);
    const dailyAmounts=extractAmounts(dailyText);

    if(receiptAmounts.length===0){
      msg("明細画像から金額を読み取れませんでした。明細を明るく正面から撮り直してください。","err");
      return;
    }

    const rowCount=Math.max(25,receiptAmounts.length,dailyAmounts.length);
    const dailyRows=analyzeDailyColumnsByInk(dailyImg,rowCount);

    buildReport(dailyRows,receiptAmounts);

    msg(
      `完成しました。
明細金額：${receiptAmounts.length}件
日報参考数字：${dailyAmounts.length}件
現金判定：${dailyRows.filter(x=>x.type==="cash").length}件
未収判定：${dailyRows.filter(x=>x.type==="credit").length}件
不明/空欄：${dailyRows.filter(x=>x.type==="unknown"||x.type==="blank").length}件`,
      "ok"
    );

  }catch(e){
    msg("エラー：" + e.message,"err");
  }
}
</script>
</body>
</html>
