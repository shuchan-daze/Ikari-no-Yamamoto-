<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>日報チェック by 怒りの山本 v2.7</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#f4f5f7;
  color:#111827;
}
header{
  background:#fff;
  padding:18px 16px 12px;
  border-bottom:1px solid #e5e7eb;
  position:sticky;
  top:0;
  z-index:5;
}
h1{
  margin:0;
  font-size:22px;
}
header p{
  margin:6px 0 0;
  color:#6b7280;
  font-size:14px;
}
main{
  max-width:980px;
  margin:0 auto;
  padding:14px;
}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.04);
}
h2{
  margin:0 0 12px;
  font-size:20px;
}
label{
  display:block;
  font-weight:700;
  margin:12px 0 6px;
}
input,textarea,button,select{
  font-size:16px;
  box-sizing:border-box;
}
input[type=number],textarea,select{
  width:100%;
  border:1px solid #d1d5db;
  border-radius:12px;
  padding:10px;
}
textarea{
  min-height:170px;
}
button{
  border:0;
  background:#111827;
  color:#fff;
  padding:12px 16px;
  border-radius:12px;
  font-weight:700;
  margin:8px 6px 8px 0;
}
button.sub{
  background:#6b7280;
}
.note{
  font-size:14px;
  color:#4b5563;
  line-height:1.7;
}
.status{
  background:#eef4ff;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  white-space:pre-wrap;
  color:#111827;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
}
.preview{
  width:100%;
  max-height:520px;
  object-fit:contain;
  border:1px solid #d1d5db;
  border-radius:12px;
  background:#fafafa;
}
.summary{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
@media(max-width:700px){
  .summary{grid-template-columns:1fr 1fr;}
}
.sumBox{
  background:#fff8d9;
  border:1px solid #facc15;
  border-radius:14px;
  padding:12px;
}
.sumBox span{
  display:block;
  color:#6b7280;
  font-size:13px;
}
.sumBox b{
  font-size:24px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  font-size:14px;
}
th,td{
  border:1px solid #d1d5db;
  padding:7px;
}
th{
  background:#f3f4f6;
}
td.num,th.num{
  text-align:right;
}
td.center,th.center{
  text-align:center;
}
.cashCell{
  background:#fff;
}
.creditCell{
  background:#fff;
}
.warn{
  background:#ffdede!important;
}
.missing{
  background:#dff4ff!important;
}
.unknown{
  background:#fff3cd!important;
}
.small{
  font-size:12px;
  color:#6b7280;
}
</style>
</head>

<body>
<header>
  <h1>日報チェック by 怒りの山本 v2.7</h1>
  <p>日報画像の「現金欄／未収欄の書き込み位置」を見て、売上明細の金額を順番に流し込みます。</p>
</header>

<main>

<section class="card">
  <h2>1. 写真を読み込む</h2>

  <div class="grid">
    <div>
      <label>日報写真</label>
      <input id="dailyFile" type="file" accept="image/*" capture="environment">
    </div>
    <div>
      <label>明細写真 ※任意</label>
      <input id="receiptFile" type="file" accept="image/*" capture="environment">
    </div>
  </div>

  <label>売上明細テキスト</label>
  <textarea id="receiptText" placeholder="ここに売上明細OCR結果、または金額を上から順番に貼る
例：
4,300
3,000
2,500
11,100
900"></textarea>

  <button onclick="runAll()">日報を完成させる</button>
  <button class="sub" onclick="resetAll()">リセット</button>

  <div id="status" class="status">未処理</div>
</section>

<section class="card">
  <h2>2. 日報読み取り設定</h2>
  <p class="note">
    ここは帳票に合わせるための設定です。まず初期値で試して、赤い行ガイドが実際の行とズレる場合だけ調整してください。
    OCRで数字を読むのではなく、各行の「現金欄に書き込みがあるか」「未収欄に書き込みがあるか」を画像の濃さで判定します。
  </p>

  <div class="grid">
    <div>
      <label>日報の行数</label>
      <input id="rowCount" type="number" value="25" min="1">
    </div>
    <div>
      <label>書き込み判定の強さ</label>
      <input id="inkThreshold" type="number" value="7" min="1" max="50">
    </div>
    <div>
      <label>表の上位置 %</label>
      <input id="topPct" type="number" value="20" min="0" max="100">
    </div>
    <div>
      <label>表の下位置 %</label>
      <input id="bottomPct" type="number" value="91" min="0" max="100">
    </div>
    <div>
      <label>現金欄 左 %</label>
      <input id="cashLeft" type="number" value="64" min="0" max="100">
    </div>
    <div>
      <label>現金欄 右 %</label>
      <input id="cashRight" type="number" value="78" min="0" max="100">
    </div>
    <div>
      <label>未収欄 左 %</label>
      <input id="creditLeft" type="number" value="78" min="0" max="100">
    </div>
    <div>
      <label>未収欄 右 %</label>
      <input id="creditRight" type="number" value="94" min="0" max="100">
    </div>
  </div>

  <button onclick="analyzeDailyOnly()">日報画像だけ解析</button>
</section>

<section class="card">
  <h2>3. プレビュー</h2>
  <canvas id="dailyCanvas" class="preview"></canvas>
</section>

<section class="card">
  <h2>4. 集計</h2>
  <div class="summary">
    <div class="sumBox"><span>件数</span><b id="sumCount">0</b></div>
    <div class="sumBox"><span>現金合計</span><b id="sumCash">0円</b></div>
    <div class="sumBox"><span>未収合計</span><b id="sumCredit">0円</b></div>
    <div class="sumBox"><span>総合計</span><b id="sumTotal">0円</b></div>
  </div>
</section>

<section class="card">
  <h2>5. 完成日報</h2>
  <table>
    <thead>
      <tr>
        <th class="center">No</th>
        <th class="num">現金</th>
        <th class="num">未収</th>
        <th class="center">判定</th>
        <th>メモ</th>
      </tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</section>

</main>

<script>
let dailyImageObj = null;
let dailyRows = [];
let receiptAmounts = [];

function yen(n){
  if(!n) return "";
  return Number(n).toLocaleString("ja-JP") + "円";
}

function setStatus(msg){
  document.getElementById("status").textContent = msg;
}

function readSettings(){
  return {
    rowCount:Number(document.getElementById("rowCount").value || 25),
    inkThreshold:Number(document.getElementById("inkThreshold").value || 7),
    topPct:Number(document.getElementById("topPct").value || 20) / 100,
    bottomPct:Number(document.getElementById("bottomPct").value || 91) / 100,
    cashLeft:Number(document.getElementById("cashLeft").value || 64) / 100,
    cashRight:Number(document.getElementById("cashRight").value || 78) / 100,
    creditLeft:Number(document.getElementById("creditLeft").value || 78) / 100,
    creditRight:Number(document.getElementById("creditRight").value || 94) / 100
  };
}

function extractAmounts(text){
  const out = [];
  const lines = text.split(/\n/);

  for(const line of lines){
    let s = line
      .replace(/[￥¥円]/g," ")
      .replace(/[|｜]/g," ")
      .replace(/\s+/g," ");

    const matches = s.match(/\d{1,3}(?:,\d{3})+|\d{3,6}/g);
    if(!matches) continue;

    for(const m of matches){
      const n = Number(m.replace(/,/g,""));
      if(n >= 100 && n <= 999999){
        out.push(n);
      }
    }
  }
  return out;
}

function loadImageFromFile(file){
  return new Promise((resolve,reject)=>{
    if(!file) return reject(new Error("file missing"));
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function drawBaseImage(img){
  const canvas = document.getElementById("dailyCanvas");
  const ctx = canvas.getContext("2d");

  const maxW = 1100;
  const scale = Math.min(1, maxW / img.width);
  canvas.width = Math.round(img.width * scale);
  canvas.height = Math.round(img.height * scale);

  ctx.drawImage(img,0,0,canvas.width,canvas.height);
  return {canvas,ctx};
}

function darknessScore(ctx,x1,y1,x2,y2){
  const w = Math.max(1,Math.floor(x2-x1));
  const h = Math.max(1,Math.floor(y2-y1));
  const data = ctx.getImageData(Math.floor(x1),Math.floor(y1),w,h).data;

  let dark = 0;
  let total = 0;

  for(let i=0;i<data.length;i+=16){
    const r = data[i];
    const g = data[i+1];
    const b = data[i+2];
    const avg = (r+g+b)/3;

    if(avg < 150) dark++;
    total++;
  }

  return total ? (dark / total) * 100 : 0;
}

async function analyzeDailyOnly(){
  const file = document.getElementById("dailyFile").files[0];
  if(!file){
    setStatus("日報写真が選択されていません。");
    return;
  }

  dailyImageObj = await loadImageFromFile(file);
  dailyRows = analyzeDailyImage(dailyImageObj);
  setStatus(`日報から ${dailyRows.length}行を作成しました。\n現金判定：${dailyRows.filter(r=>r.type==="cash").length}件\n未収判定：${dailyRows.filter(r=>r.type==="credit").length}件\n不明：${dailyRows.filter(r=>r.type==="unknown").length}件`);
}

function analyzeDailyImage(img){
  const s = readSettings();
  const {canvas,ctx} = drawBaseImage(img);
  const W = canvas.width;
  const H = canvas.height;

  const top = H * s.topPct;
  const bottom = H * s.bottomPct;
  const rowH = (bottom - top) / s.rowCount;

  const cashX1 = W * s.cashLeft;
  const cashX2 = W * s.cashRight;
  const creditX1 = W * s.creditLeft;
  const creditX2 = W * s.creditRight;

  const rows = [];

  ctx.lineWidth = 1;

  for(let i=0;i<s.rowCount;i++){
    const y1 = top + rowH * i;
    const y2 = y1 + rowH;
    const padY = rowH * 0.18;

    const cashScore = darknessScore(ctx,cashX1,y1+padY,cashX2,y2-padY);
    const creditScore = darknessScore(ctx,creditX1,y1+padY,creditX2,y2-padY);

    let type = "unknown";
    if(cashScore >= s.inkThreshold && cashScore >= creditScore * 1.05){
      type = "cash";
    }
    if(creditScore >= s.inkThreshold && creditScore > cashScore * 1.05){
      type = "credit";
    }
    if(cashScore < s.inkThreshold && creditScore < s.inkThreshold){
      type = "blank";
    }

    rows.push({
      no:i+1,
      type,
      cashScore,
      creditScore
    });

    ctx.strokeStyle = "rgba(255,0,0,.75)";
    ctx.beginPath();
    ctx.moveTo(0,y1);
    ctx.lineTo(W,y1);
    ctx.stroke();

    ctx.strokeStyle = "rgba(0,120,255,.8)";
    ctx.strokeRect(cashX1,y1,cashX2-cashX1,rowH);

    ctx.strokeStyle = "rgba(255,150,0,.8)";
    ctx.strokeRect(creditX1,y1,creditX2-creditX1,rowH);

    ctx.fillStyle =
      type === "cash" ? "rgba(0,120,255,.18)" :
      type === "credit" ? "rgba(255,150,0,.18)" :
      type === "blank" ? "rgba(180,180,180,.10)" :
      "rgba(255,0,0,.14)";

    ctx.fillRect(0,y1,W,rowH);

    ctx.fillStyle = "#111";
    ctx.font = "12px sans-serif";
    ctx.fillText(`${i+1} ${type} C:${cashScore.toFixed(1)} U:${creditScore.toFixed(1)}`,8,y1+14);
  }

  return rows;
}

function buildReport(){
  const tbody = document.getElementById("body");
  tbody.innerHTML = "";

  let cashTotal = 0;
  let creditTotal = 0;
  let usedCount = 0;

  const rowCount = dailyRows.length || Number(document.getElementById("rowCount").value || 25);

  for(let i=0;i<rowCount;i++){
    const row = dailyRows[i] || {no:i+1,type:"unknown",cashScore:0,creditScore:0};
    const amount = receiptAmounts[i] || null;

    const tr = document.createElement("tr");
    const no = document.createElement("td");
    const cash = document.createElement("td");
    const credit = document.createElement("td");
    const judge = document.createElement("td");
    const memo = document.createElement("td");

    no.className = "center";
    cash.className = "num";
    credit.className = "num";
    judge.className = "center";

    no.textContent = row.no;

    if(!amount){
      cash.classList.add("missing");
      credit.classList.add("missing");
      judge.textContent = row.type;
      memo.textContent = "売上明細に対応する金額なし";
    }else{
      usedCount++;

      if(row.type === "credit"){
        credit.textContent = yen(amount);
        creditTotal += amount;
        judge.textContent = "未収";
      }else if(row.type === "cash"){
        cash.textContent = yen(amount);
        cashTotal += amount;
        judge.textContent = "現金";
      }else if(row.type === "blank"){
        cash.classList.add("missing");
        credit.classList.add("missing");
        judge.textContent = "空欄";
        memo.textContent = "日報側に書き込みが見えない。要確認";
      }else{
        cash.textContent = yen(amount);
        cash.classList.add("unknown");
        credit.classList.add("unknown");
        cashTotal += amount;
        judge.textContent = "不明";
        memo.textContent = "現金/未収の判定が曖昧。仮で現金へ配置";
      }
    }

    if(!memo.textContent){
      memo.innerHTML =
        `<span class="small">現金濃度:${row.cashScore?.toFixed(1) ?? "-"} / 未収濃度:${row.creditScore?.toFixed(1) ?? "-"}</span>`;
    }

    tr.appendChild(no);
    tr.appendChild(cash);
    tr.appendChild(credit);
    tr.appendChild(judge);
    tr.appendChild(memo);
    tbody.appendChild(tr);
  }

  document.getElementById("sumCount").textContent = usedCount;
  document.getElementById("sumCash").textContent = yen(cashTotal) || "0円";
  document.getElementById("sumCredit").textContent = yen(creditTotal) || "0円";
  document.getElementById("sumTotal").textContent = yen(cashTotal + creditTotal) || "0円";
}

async function runAll(){
  try{
    const dailyFile = document.getElementById("dailyFile").files[0];
    if(!dailyFile){
      setStatus("日報写真がありません。日報写真は必須です。");
      return;
    }

    const receiptText = document.getElementById("receiptText").value;
    receiptAmounts = extractAmounts(receiptText);

    if(receiptAmounts.length === 0){
      setStatus("売上明細テキストから金額が取れていません。金額を貼り付けてください。");
      return;
    }

    dailyImageObj = await loadImageFromFile(dailyFile);
    dailyRows = analyzeDailyImage(dailyImageObj);

    buildReport();

    setStatus(
      `完成しました。\n` +
      `日報行数：${dailyRows.length}\n` +
      `明細金額：${receiptAmounts.length}件\n` +
      `現金判定：${dailyRows.filter(r=>r.type==="cash").length}件\n` +
      `未収判定：${dailyRows.filter(r=>r.type==="credit").length}件\n` +
      `空欄：${dailyRows.filter(r=>r.type==="blank").length}件\n` +
      `不明：${dailyRows.filter(r=>r.type==="unknown").length}件`
    );
  }catch(e){
    setStatus("エラー：" + e.message);
  }
}

function resetAll(){
  dailyRows = [];
  receiptAmounts = [];
  document.getElementById("body").innerHTML = "";
  document.getElementById("sumCount").textContent = "0";
  document.getElementById("sumCash").textContent = "0円";
  document.getElementById("sumCredit").textContent = "0円";
  document.getElementById("sumTotal").textContent = "0円";
  setStatus("リセットしました。");
}
</script>
</body>
</html>
