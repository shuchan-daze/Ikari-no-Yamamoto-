<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日報チェック by 怒りの山本 v2.6</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
:root{
 --bg:#f4f5f7;
 --card:#fff;
 --line:#e5e7eb;
 --text:#111827;
 --muted:#6b7280;
 --red:#ffe8e8;
 --blue:#e8f5ff;
 --yellow:#fff6d8;
}

*{box-sizing:border-box}

body{
 margin:0;
 background:var(--bg);
 color:var(--text);
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

header{
 padding:16px;
 background:#fff;
 border-bottom:1px solid var(--line);
 position:sticky;
 top:0;
 z-index:10;
}

h1{
 margin:0;
 font-size:22px;
}

.sub{
 margin-top:4px;
 font-size:13px;
 color:var(--muted);
}

main{
 max-width:1000px;
 margin:auto;
 padding:12px;
}

.card{
 background:var(--card);
 border:1px solid var(--line);
 border-radius:18px;
 padding:14px;
 margin-bottom:12px;
}

.grid2{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:8px;
}

.action{
 display:block;
 width:100%;
 border:0;
 border-radius:14px;
 padding:16px;
 font-size:17px;
 font-weight:700;
 text-align:center;
 background:#111827;
 color:#fff;
}

.action.gray{
 background:#e5e7eb;
 color:#111827;
}

.fileInput{
 display:none;
}

.status{
 margin-top:10px;
 padding:12px;
 border-radius:12px;
 background:#f9fafb;
 border:1px solid var(--line);
 font-size:13px;
 white-space:pre-wrap;
}

.previewGrid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:8px;
}

.previewBox{
 border:1px solid var(--line);
 border-radius:14px;
 padding:8px;
 background:#fafafa;
}

.previewBox img{
 width:100%;
 max-height:240px;
 object-fit:contain;
 display:none;
 border-radius:10px;
}

.previewTitle{
 font-size:13px;
 color:var(--muted);
 margin-bottom:6px;
}

.tableWrap{
 overflow:auto;
 border:1px solid var(--line);
 border-radius:14px;
 background:#fff;
}

table{
 width:100%;
 border-collapse:collapse;
 min-width:600px;
}

th,td{
 border-bottom:1px solid var(--line);
 padding:10px;
 text-align:center;
}

th{
 background:#f3f4f6;
}

input.cell{
 width:100%;
 border:1px solid #d1d5db;
 border-radius:10px;
 padding:8px;
 text-align:right;
 font-size:16px;
}

.red{
 background:var(--red);
}

.blue{
 background:var(--blue);
}

.summary{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:8px;
}

.box{
 background:var(--yellow);
 border-radius:14px;
 padding:12px;
 border:1px solid #facc15;
}

.box small{
 display:block;
 color:var(--muted);
}

.box b{
 font-size:22px;
}
</style>
</head>

<body>

<header>
<h1>日報チェック by 怒りの山本 v2.6</h1>
<div class="sub">
日報と営業明細を照らし合わせて、完成した日報を作る確認支援UI。
</div>
</header>

<main>

<section class="card">

<div class="grid2">
<label class="action" for="reportCam">📷 日報を撮影</label>
<label class="action gray" for="reportLib">🖼 日報の写真を選択</label>
</div>

<div class="grid2" style="margin-top:8px">
<label class="action" for="detailCam">📷 明細を撮影</label>
<label class="action gray" for="detailLib">🖼 明細の写真を選択</label>
</div>

<input id="reportCam" class="fileInput" type="file" accept="image/*" capture="environment">
<input id="reportLib" class="fileInput" type="file" accept="image/*">
<input id="detailCam" class="fileInput" type="file" accept="image/*" capture="environment">
<input id="detailLib" class="fileInput" type="file" accept="image/*">

<div id="status" class="status">
日報または明細を撮影、または写真を選択してください。
</div>

</section>

<section class="card">

<div class="previewGrid">

<div class="previewBox">
<div class="previewTitle">日報画像</div>
<img id="reportPreview">
</div>

<div class="previewBox">
<div class="previewTitle">明細画像</div>
<img id="detailPreview">
</div>

</div>

</section>

<section class="card">

<div class="tableWrap">
<table>

<thead>
<tr>
<th>No</th>
<th>現金</th>
<th>未収</th>
</tr>
</thead>

<tbody id="rowsBody"></tbody>

</table>
</div>

</section>

<section class="card">

<div class="summary">

<div class="box">
<small>現金合計</small>
<b id="cashTotal">0円</b>
</div>

<div class="box">
<small>未収合計</small>
<b id="receivableTotal">0円</b>
</div>

<div class="box">
<small>総合計</small>
<b id="grossTotal">0円</b>
</div>

<div class="box">
<small>消費税</small>
<b id="taxTotal">0円</b>
</div>

<div class="box">
<small>税抜営業収入</small>
<b id="netTotal">0円</b>
</div>

</div>

</section>

</main>

<script>

let reportNums=[];
let detailNums=[];
let rows=[];

const $=id=>document.getElementById(id);

function setStatus(msg){
 $("status").textContent=msg;
}

function yen(n){
 return Number(n||0).toLocaleString("ja-JP")+"円";
}

function normalizeText(t){
 return String(t||"")
 .replace(/[０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0))
 .replace(/[，,円]/g,"");
}

function extractNumbers(t){
 const found=normalizeText(t).match(/\\b\\d{2,5}\\b/g)||[];
 return found
 .map(v=>parseInt(v,10))
 .filter(v=>v>=100&&v<=99999);
}

function showPreview(file,id){
 const img=$(id);
 img.src=URL.createObjectURL(file);
 img.style.display="block";
}

async function readNumbers(file,side){

 setStatus(side+"を読み取り中...");

 const result=await Tesseract.recognize(file,"eng");

 const nums=extractNumbers(result.data.text||"");

 setStatus(side+"から "+nums.length+"件読み取りました。");

 return nums;
}

async function handleFile(file,side){

 if(!file)return;

 if(side==="日報"){
  showPreview(file,"reportPreview");
  reportNums=await readNumbers(file,side);
 }else{
  showPreview(file,"detailPreview");
  detailNums=await readNumbers(file,side);
 }

 buildRows();
}

function buildRows(){

 const max=Math.max(reportNums.length,detailNums.length);

 rows=[];

 for(let i=0;i<max;i++){

  const d=detailNums[i]||"";

  let cash="";
  let receivable="";

  const report=reportNums[i]||"";

  if(report===d){
   cash=d;
  }else{
   receivable=d;
  }

  rows.push({
   cash,
   receivable,
   mismatch:(report!==d&&report!==""),
   missing:(report!==""&&d==="")
  });
 }

 renderRows();
}

function renderRows(){

 const body=$("rowsBody");

 body.innerHTML="";

 rows.forEach((r,i)=>{

  const tr=document.createElement("tr");

  let cashClass="";
  let receivableClass="";

  if(r.mismatch){
   if(r.cash)cashClass="red";
   if(r.receivable)receivableClass="red";
  }

  if(r.missing){
   cashClass="blue";
   receivableClass="blue";
  }

  tr.innerHTML=`
   <td>${i+1}</td>
   <td class="${cashClass}">
    <input class="cell" value="${r.cash}">
   </td>
   <td class="${receivableClass}">
    <input class="cell" value="${r.receivable}">
   </td>
  `;

  body.appendChild(tr);
 });

 updateTotals();
}

function updateTotals(){

 let cash=0;
 let receivable=0;

 rows.forEach(r=>{
  cash+=Number(r.cash||0);
  receivable+=Number(r.receivable||0);
 });

 const gross=cash+receivable;
 const tax=Math.round((gross*10/110)/10)*10;
 const net=gross-tax;

 $("cashTotal").textContent=yen(cash);
 $("receivableTotal").textContent=yen(receivable);
 $("grossTotal").textContent=yen(gross);
 $("taxTotal").textContent=yen(tax);
 $("netTotal").textContent=yen(net);
}

document.addEventListener("DOMContentLoaded",()=>{

 $("reportCam").addEventListener("change",e=>handleFile(e.target.files[0],"日報"));
 $("reportLib").addEventListener("change",e=>handleFile(e.target.files[0],"日報"));

 $("detailCam").addEventListener("change",e=>handleFile(e.target.files[0],"明細"));
 $("detailLib").addEventListener("change",e=>handleFile(e.target.files[0],"明細"));

});

</script>

</body>
</html>
