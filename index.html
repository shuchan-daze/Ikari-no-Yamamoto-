<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>日報チェック by 怒りの山本 v2.8</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#f5f6f8;
  color:#111827;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}
main{max-width:760px;margin:0 auto;padding:22px}
h1{font-size:28px;margin:10px 0 6px}
.sub{color:#6b7280;font-size:16px;margin:0 0 28px;line-height:1.6}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:22px;
  padding:18px;
  margin:18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}
.btnGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button,.fileLabel{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:76px;
  border-radius:18px;
  border:0;
  font-size:22px;
  font-weight:800;
  cursor:pointer;
}
button.dark,.fileLabel.dark{background:#0f172a;color:white}
button.light,.fileLabel.light{background:#e5e7eb;color:#111827}
input[type=file]{display:none}
.previewWrap{
  margin-top:16px;
  border:1px solid #e5e7eb;
  border-radius:18px;
  overflow:hidden;
  background:#fafafa;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}
.previewBox{background:#fff;border-radius:14px;padding:8px}
.previewBox p{margin:0 0 6px;color:#6b7280;font-weight:700}
.previewBox img{width:100%;max-height:360px;object-fit:contain;border-radius:12px}
.notice{
  margin-top:14px;
  border-radius:18px;
  padding:16px;
  font-weight:800;
  line-height:1.6;
  white-space:pre-wrap;
}
.ok{background:#e8fff0;color:#166534;border:1px solid #86efac}
.err{background:#ffe1e1;color:#991b1b;border:1px solid #fca5a5}
.info{background:#eef4ff;color:#1e3a8a;border:1px solid #bfdbfe}
.steps div{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  margin:10px 0;
  font-size:18px;
}
textarea{
  width:100%;
  min-height:130px;
  border:1px solid #d1d5db;
  border-radius:14px;
  padding:12px;
  font-size:16px;
}
.controls{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.controls label{
  font-size:13px;
  color:#4b5563;
  font-weight:700;
}
.controls input{
  width:100%;
  margin-top:4px;
  padding:8px;
  border:1px solid #d1d5db;
  border-radius:10px;
  font-size:16px;
}
.summary{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.sumBox{
  background:#fff7d6;
  border:1px solid #facc15;
  border-radius:18px;
  padding:14px;
}
.sumBox span{display:block;color:#6b7280;font-weight:700}
.sumBox b{font-size:28px}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  font-size:15px;
}
th,td{border:1px solid #d1d5db;padding:8px}
th{background:#f3f4f6}
.center{text-align:center}
.num{text-align:right}
.missing{background:#dff4ff!important}
.warn{background:#ffdede!important}
.unknown{background:#fff3cd!important}
.small{font-size:12px;color:#6b7280}
.canvasWrap{display:none}
@media(max-width:620px){
  main{padding:20px}
  h1{font-size:25px}
  button,.fileLabel{font-size:20px;min-height:72px}
  .previewWrap{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<main>
  <h1>日報チェック by 怒りの山本 v2.8</h1>
  <p class="sub">日報を正しく仕上げるための確認アプリ。日報写真の現金/未収の位置を見て、明細金額を順番に流し込みます。</p>

  <section class="card">
    <div class="btnGrid">
      <label class="fileLabel dark">📷 日報を撮影<input id="dailyCamera" type="file" accept="image/*" capture="environment"></label>
      <label class="fileLabel light">🖼️ 日報の写真を選択<input id="dailyPick" type="file" accept="image/*"></label>
      <label class="fileLabel dark">📷 明細を撮影<input id="receiptCamera" type="file" accept="image/*" capture="environment"></label>
      <label class="fileLabel light">🖼️ 明細の写真を選択<input id="receiptPick" type="file" accept="image/*"></label>
    </div>

    <div class="previewWrap">
      <div class="previewBox">
        <p>日報画像</p>
        <img id="dailyPreview">
      </div>
      <div class="previewBox">
        <p>明細画像</p>
        <img id="receiptPreview">
      </div>
    </div>

    <div id="message" class="notice info">📷 ① 日報を撮る、または写真を選ぶ
📷 ② 明細を撮る、または写真を選ぶ
🔍 ③ 日報と明細を見比べて完成日報を作る</div>
  </section>

  <section class="card">
    <h2>明細テキスト</h2>
    <p class="sub">今のブラウザ版では画像OCRは弱いので、まずは明細金額をここに貼る。数字は上から順番に拾います。</p>
    <textarea id="receiptText" placeholder="例：
4,300
3,000
2,500
11,100
900
2,700"></textarea>
    <button class="dark" onclick="run()">🔍 日報を完成させる</button>
  </section>

  <section class="card">
    <h2>読み取り調整</h2>
    <div class="controls">
      <label>日報行数<input id="rowCount" type="number" value="25"></label>
      <label>判定強さ<input id="threshold" type="number" value="6"></label>
      <label>表の上位置%<input id="topPct" type="number" value="24"></label>
      <label>表の下位置%<input id="bottomPct" type="number" value="91"></label>
      <label>現金 左%<input id="cashLeft" type="number" value="59"></label>
      <label>現金 右%<input id="cashRight" type="number" value="74"></label>
      <label>未収 左%<input id="creditLeft" type="number" value="74"></label>
      <label>未収 右%<input id="creditRight" type="number" value="90"></label>
    </div>
  </section>

  <section class="card">
    <h2>集計</h2>
    <div class="summary">
      <div class="sumBox"><span>現金合計</span><b id="cashSum">0円</b></div>
      <div class="sumBox"><span>未収合計</span><b id="creditSum">0円</b></div>
      <div class="sumBox"><span>総合計</span><b id="totalSum">0円</b></div>
      <div class="sumBox"><span>件数</span><b id="countSum">0</b></div>
    </div>
  </section>

  <section class="card">
    <h2>完成日報</h2>
    <table>
      <thead>
        <tr>
          <th class="center">No</th>
          <th class="num">現金</th>
          <th class="num">未収</th>
          <th class="center">判定</th>
          <th>確認</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </section>

  <div class="canvasWrap"><canvas id="canvas"></canvas></div>
</main>

<script>
let dailyImg=null;
let receiptImg=null;

["dailyCamera","dailyPick"].forEach(id=>{
  document.getElementById(id).addEventListener("change",e=>loadPreview(e,"daily"));
});
["receiptCamera","receiptPick"].forEach(id=>{
  document.getElementById(id).addEventListener("change",e=>loadPreview(e,"receipt"));
});

function msg(text,type="info"){
  const el=document.getElementById("message");
  el.className="notice "+type;
  el.textContent=text;
}

function loadPreview(e,type){
  const file=e.target.files[0];
  if(!file)return;
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    if(type==="daily"){
      dailyImg=img;
      document.getElementById("dailyPreview").src=url;
    }else{
      receiptImg=img;
      document.getElementById("receiptPreview").src=url;
    }
    msg("画像を読み込みました。明細テキストを貼って「日報を完成させる」を押してください。","ok");
  };
  img.src=url;
}

function yen(n){
  return n ? Number(n).toLocaleString("ja-JP")+"円" : "";
}

function extractAmounts(text){
  const arr=[];
  text.split(/\n/).forEach(line=>{
    const m=line.replace(/[￥¥円]/g," ").match(/\d{1,3}(?:,\d{3})+|\d{3,6}/g);
    if(!m)return;
    m.forEach(x=>{
      const n=Number(x.replace(/,/g,""));
      if(n>=100 && n<=999999)arr.push(n);
    });
  });
  return arr;
}

function setting(){
  const v=id=>Number(document.getElementById(id).value);
  return{
    rowCount:v("rowCount"),
    threshold:v("threshold"),
    top:v("topPct")/100,
    bottom:v("bottomPct")/100,
    cashL:v("cashLeft")/100,
    cashR:v("cashRight")/100,
    creditL:v("creditLeft")/100,
    creditR:v("creditRight")/100
  };
}

function darkness(ctx,x1,y1,x2,y2){
  const w=Math.max(1,Math.floor(x2-x1));
  const h=Math.max(1,Math.floor(y2-y1));
  const data=ctx.getImageData(Math.floor(x1),Math.floor(y1),w,h).data;
  let dark=0,total=0;
  for(let i=0;i<data.length;i+=20){
    const avg=(data[i]+data[i+1]+data[i+2])/3;
    if(avg<150)dark++;
    total++;
  }
  return total ? dark/total*100 : 0;
}

function analyzeDaily(){
  if(!dailyImg)return null;

  const s=setting();
  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");
  const scale=Math.min(1,900/dailyImg.width);
  canvas.width=Math.round(dailyImg.width*scale);
  canvas.height=Math.round(dailyImg.height*scale);
  ctx.drawImage(dailyImg,0,0,canvas.width,canvas.height);

  const W=canvas.width,H=canvas.height;
  const top=H*s.top,bottom=H*s.bottom,rowH=(bottom-top)/s.rowCount;
  const rows=[];

  for(let i=0;i<s.rowCount;i++){
    const y1=top+i*rowH;
    const y2=y1+rowH;
    const pad=rowH*.18;

    const cash=darkness(ctx,W*s.cashL,y1+pad,W*s.cashR,y2-pad);
    const credit=darkness(ctx,W*s.creditL,y1+pad,W*s.creditR,y2-pad);

    let type="blank";
    if(cash>=s.threshold || credit>=s.threshold){
      if(cash>credit*1.08)type="cash";
      else if(credit>cash*1.08)type="credit";
      else type="unknown";
    }
    rows.push({no:i+1,type,cash,credit});
  }
  return rows;
}

function run(){
  const amounts=extractAmounts(document.getElementById("receiptText").value);
  if(!dailyImg){
    msg("日報画像がありません。日報写真を入れてください。","err");
    return;
  }
  if(amounts.length===0){
    msg("明細金額がありません。明細テキストに金額を貼ってください。","err");
    return;
  }

  const dailyRows=analyzeDaily();
  const tbody=document.getElementById("rows");
  tbody.innerHTML="";

  let cashTotal=0,creditTotal=0,used=0;

  dailyRows.forEach((r,i)=>{
    const amount=amounts[i]||null;
    const tr=document.createElement("tr");
    const tdNo=document.createElement("td");
    const tdCash=document.createElement("td");
    const tdCredit=document.createElement("td");
    const tdJudge=document.createElement("td");
    const tdMemo=document.createElement("td");

    tdNo.className="center";
    tdCash.className="num";
    tdCredit.className="num";
    tdJudge.className="center";
    tdNo.textContent=r.no;

    if(!amount){
      tdCash.classList.add("missing");
      tdCredit.classList.add("missing");
      tdJudge.textContent=r.type==="blank"?"空欄":r.type;
      tdMemo.textContent="明細側に対応金額なし";
    }else{
      used++;
      if(r.type==="credit"){
        tdCredit.textContent=yen(amount);
        creditTotal+=amount;
        tdJudge.textContent="未収";
      }else if(r.type==="cash"){
        tdCash.textContent=yen(amount);
        cashTotal+=amount;
        tdJudge.textContent="現金";
      }else if(r.type==="blank"){
        tdCash.classList.add("missing");
        tdCredit.classList.add("missing");
        tdJudge.textContent="空欄";
        tdMemo.textContent="日報側に書き込みなし。要確認";
      }else{
        tdCash.textContent=yen(amount);
        tdCash.classList.add("unknown");
        tdCredit.classList.add("unknown");
        cashTotal+=amount;
        tdJudge.textContent="不明";
        tdMemo.textContent="現金/未収が曖昧。仮で現金";
      }
    }

    if(!tdMemo.textContent){
      tdMemo.innerHTML=`<span class="small">現金濃度 ${r.cash.toFixed(1)} / 未収濃度 ${r.credit.toFixed(1)}</span>`;
    }

    tr.append(tdNo,tdCash,tdCredit,tdJudge,tdMemo);
    tbody.appendChild(tr);
  });

  document.getElementById("cashSum").textContent=yen(cashTotal)||"0円";
  document.getElementById("creditSum").textContent=yen(creditTotal)||"0円";
  document.getElementById("totalSum").textContent=yen(cashTotal+creditTotal)||"0円";
  document.getElementById("countSum").textContent=used;

  msg(`完成しました。
日報行数：${dailyRows.length}
明細件数：${amounts.length}
現金判定：${dailyRows.filter(x=>x.type==="cash").length}
未収判定：${dailyRows.filter(x=>x.type==="credit").length}
不明/空欄：${dailyRows.filter(x=>x.type==="unknown"||x.type==="blank").length}`,"ok");
}
</script>
</body>
</html>
