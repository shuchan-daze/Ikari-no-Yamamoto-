<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OCR数字読み取りテスト</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      background: #f6f6f6;
    }
    button, input {
      font-size: 16px;
      margin: 8px 0;
    }
    .box {
      background: white;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    img, canvas {
      max-width: 100%;
      margin-top: 10px;
      border: 1px solid #ccc;
    }
    .number {
      font-size: 20px;
      font-weight: bold;
      padding: 6px 0;
    }
  </style>
</head>

<body>
  <h2>OCR数字読み取りテスト</h2>

  <input id="fileInput" type="file" accept="image/*" capture="environment" />

  <button id="runBtn">OCR開始</button>

  <div class="box" id="status">画像を選んでください</div>

  <h3>元画像</h3>
  <img id="preview" />

  <h3>OCR用に加工した画像</h3>
  <canvas id="canvas"></canvas>

  <h3>OCR生テキスト</h3>
  <div class="box" id="rawText"></div>

  <h3>抽出した数字</h3>
  <div class="box" id="numbers"></div>

<script>
let selectedFile = null;

const fileInput = document.getElementById("fileInput");
const runBtn = document.getElementById("runBtn");
const preview = document.getElementById("preview");
const canvas = document.getElementById("canvas");
const statusBox = document.getElementById("status");
const rawTextBox = document.getElementById("rawText");
const numbersBox = document.getElementById("numbers");

fileInput.addEventListener("change", () => {
  selectedFile = fileInput.files[0];

  if (!selectedFile) return;

  const url = URL.createObjectURL(selectedFile);
  preview.src = url;

  statusBox.textContent = "画像を選択しました。OCR開始を押してください。";
  rawTextBox.textContent = "";
  numbersBox.textContent = "";
});

runBtn.addEventListener("click", async () => {
  if (!selectedFile) {
    alert("先に画像を選んでください");
    return;
  }

  statusBox.textContent = "画像を読み込み中...";
  rawTextBox.textContent = "";
  numbersBox.textContent = "";

  const image = await loadImage(selectedFile);

  statusBox.textContent = "画像をOCR用に加工中...";
  preprocessImage(image);

  statusBox.textContent = "OCR実行中... 数十秒かかることがあります";

  try {
    const result = await Tesseract.recognize(
      canvas,
      "eng",
      {
        logger: m => {
          if (m.status) {
            statusBox.textContent = `OCR実行中: ${m.status} ${Math.round((m.progress || 0) * 100)}%`;
          }
        },
        tessedit_char_whitelist: "0123456789,.-円￥ "
      }
    );

    const text = result.data.text || "";
    rawTextBox.textContent = text || "OCRテキストなし";

    const nums = extractNumbers(text);

    if (nums.length === 0) {
      statusBox.textContent = "失敗：数字を1件も読み取れませんでした";
      numbersBox.textContent = "数字なし";
      return;
    }

    statusBox.textContent = `成功：${nums.length}件の数字を抽出しました`;
    numbersBox.innerHTML = nums
      .map(n => `<div class="number">${n.toLocaleString()}</div>`)
      .join("");

  } catch (err) {
    console.error(err);
    statusBox.textContent = "OCRエラー：" + err.message;
  }
});

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function preprocessImage(img) {
  const ctx = canvas.getContext("2d");

  const scale = 2.5;
  canvas.width = img.width * scale;
  canvas.height = img.height * scale;

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    let gray = 0.299 * r + 0.587 * g + 0.114 * b;

    gray = (gray - 128) * 1.8 + 128;

    const bw = gray > 150 ? 255 : 0;

    data[i] = bw;
    data[i + 1] = bw;
    data[i + 2] = bw;
  }

  ctx.putImageData(imageData, 0, 0);
}

function extractNumbers(text) {
  const matches = text.match(/[0-9][0-9,.\s]{1,}/g) || [];

  return matches
    .map(s => s.replace(/[^\d]/g, ""))
    .filter(s => s.length >= 2)
    .map(s => Number(s))
    .filter(n => Number.isFinite(n) && n > 0);
}
</script>
</body>
</html>
